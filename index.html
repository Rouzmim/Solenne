<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solenne fête ses 30 ans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      color: white;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      background-image: url('denim.jpg');
      background-size: 50% auto;
      background-repeat: repeat;
      background-attachment: fixed;
      background-color: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #background-pattern {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .bg-sticker { position: absolute; width: 150px; opacity: 0.9; z-index: 1; }

    /* --- BOITE ROUE --- */
    .container {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(45, 49, 66, 0.95) 100%);
      padding: 50px 40px;
      max-width: 900px;
      width: 95%;
      border: 6px solid #FF8DA1;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      position: relative;
      z-index: 10;
      margin-bottom: 50px;
    }

    h1 {
      font-family: 'Climate Crisis', sans-serif;
      font-size: 3.5em;
      text-align: center;
      text-transform: uppercase;
      line-height: 0.85;
      margin-bottom: 10px;
      text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.4);
    }

    .subtitle { text-align: center; font-size: 1.1em; margin-bottom: 40px; color: #d4a574; font-weight: 600; }

    #registration-form {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .input-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input[type="text"], textarea {
      padding: 12px 20px;
      border-radius: 8px;
      border: 2px solid #FF8DA1;
      background: #1a1a2e;
      color: white;
      font-family: 'Outfit', sans-serif;
    }

    input[type="text"] { width: 200px; }

    /* --- BOUTON ORIGINAL --- */
    .spin-btn { 
      background-image: url('bouton.png');
      background-size: cover; 
      background-repeat: no-repeat;
      background-position: center;
      background-color: transparent;
      color: white; 
      font-weight: 900; 
      font-family: 'Outfit', sans-serif;
      font-size: 19px; 
      text-transform: uppercase;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      border: none; 
      cursor: pointer; 
      padding: 30px 70px; 
      position: relative;
      z-index: 10;
      filter: drop-shadow(0px 8px 10px rgba(0, 0, 0, 0.6));
      transition: all 0.15s ease-out; 
    }

    .spin-btn:active { transform: scale(0.95); }

    /* --- ROUE --- */
    .wheel-container { 
      display: flex; justify-content: center; align-items: center; 
      margin: 80px 0; position: relative; 
    }

    #star-background {
      position: absolute;
      width: 1000px; height: 1000px;
      background-image: url('star.png');
      background-size: contain; background-repeat: no-repeat; background-position: center;
      top: 50%; left: 50%; transform: translate(-50%, -50%) translate(-50px, 70px);
      z-index: 4;
    }

    #wheel { width: 420px; height: 420px; position: relative; z-index: 5; }

    #gun-pointer {
      position: absolute; width: 120px; height: 120px;
      background-image: url('gun.png'); background-size: contain; background-repeat: no-repeat;
      top: -70px; left: 50%; transform: translateX(-50%); z-index: 100;
    }

    .wheel-center { 
      position: absolute; width: 150px; height: 150px; 
      background-image: url('sherif.png'); background-size: contain; background-repeat: no-repeat;
      top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 25; 
    }

    #result { 
      margin-top: 35px; font-size: 24px; font-weight: 700; text-align: center;
      padding: 25px; color: #ffd89b; background: rgba(0,0,0,0.3); border-radius: 10px;
    }

    /* --- SECTION SAISIE MESSAGES (HORS DU CONTAINER) --- */
    .input-section {
      width: 95%; max-width: 900px; display: flex; align-items: flex-start;
      justify-content: center; gap: 30px; z-index: 10; margin-bottom: 50px;
    }

    .wanted-wrapper {
      background: rgba(0, 0, 0, 0.7); padding: 20px; border-radius: 15px; 
      border: 4px solid #FF8DA1; /* Bordure Rose */
      box-shadow: 0 15px 40px rgba(0,0,0,0.6); flex-shrink: 0;
    }

    .wanted-poster { width: 250px; height: auto; display: block; }

    .message-container-right { flex: 1; max-width: 500px; }

    .wall-title {
      font-family: 'Climate Crisis', sans-serif; font-size: 2.2em; 
      color: #FFFFFF; /* Titre Blanc */
      text-align: center; margin-bottom: 25px; 
      text-shadow: 3px 3px 0px #FF8DA1; /* Ombre Rose */
      text-transform: uppercase;
    }

    .message-input-box {
      background: rgba(26, 26, 46, 0.8); padding: 20px; border-radius: 15px;
      border: 2px solid #FF8DA1;
    }

    #msg { width: 100%; height: 100px; background: rgba(0,0,0,0.4); margin-bottom: 10px; resize: none; color: white; border: 1px solid #d4a574; }

    .send-btn-small { padding: 15px 30px !important; font-size: 14px !important; width: 100%; }

    /* --- LE MUR ALEATOIRE --- */
    #messages-wall {
      width: 100%; max-width: 1400px; min-height: 600px;
      position: relative; z-index: 10; margin-bottom: 100px;
    }

    .posted-message {
      position: absolute; width: 220px;
      background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 5px;
      border-left: 5px solid #FF8DA1; box-shadow: 8px 8px 20px rgba(0,0,0,0.5);
      font-size: 0.9em; transition: transform 0.3s; z-index: 10;
    }

    .posted-message:hover { transform: scale(1.1) !important; z-index: 100 !important; }
    .msg-author { color: #d4a574; font-weight: bold; text-transform: uppercase; font-size: 0.8em; display: block; margin-bottom: 5px; }

    @media (max-width: 800px) {
      .input-section { flex-direction: column; align-items: center; }
      .wanted-poster { width: 180px; }
      #messages-wall { display: flex; flex-direction: column; align-items: center; height: auto; }
      .posted-message { position: relative !important; left: 0 !important; top: 0 !important; margin: 10px 0; transform: none !important; width: 90%; }
    }
  </style>
</head>
<body>
  <div id="background-pattern"></div>
  
  <div class="container">
    <h1>Canadian Tuxedo is IN</h1>
    <p class="subtitle">Solenne fête ses 30 ans !</p>

    <div id="registration-form">
      <div class="input-group">
        <input type="text" id="firstName" placeholder="Prénom">
        <input type="text" id="lastName" placeholder="Nom">
      </div>
      <button id="spinBtn" class="spin-btn" onclick="checkAndSpin()">Lancer la roue</button>
    </div>

    <div class="wheel-container">
      <div id="gun-pointer"></div>
      <div id="star-background"></div>
      <svg id="wheel" viewBox="0 0 400 400"></svg>
      <div class="wheel-center"></div>
    </div>
    <div id="result"></div>
  </div>

  <div class="input-section">
    <div class="wanted-wrapper">
      <img src="wanted.png" alt="Wanted" class="wanted-poster">
    </div>
    <div class="message-container-right">
      <h2 class="wall-title">Avis de recherche</h2>
      <div class="message-input-box">
        <textarea id="msg" placeholder="Laisse un message à Solenne..."></textarea>
        <button class="spin-btn send-btn-small" onclick="sendMessage()">Poster le message</button>
      </div>
    </div>
  </div>

  <div id="messages-wall"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbv7swd0ttL9ZgGjuWFy3PcJ1yrsJoy-Y",
      authDomain: "annivsolenne.firebaseapp.com",
      projectId: "annivsolenne",
      storageBucket: "annivsolenne.firebasestorage.app",
      messagingSenderId: "911639806164",
      appId: "1:911639806164:web:306c561b7619c795783b41"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lots = [
      { text: "SHOT" }, { text: "VERRE DE VIN" }, { text: "MISSION MYSTERE" },
      { text: "UN BISOU" }, { text: "UN CASH" }, { text: "CLOPE" }
    ];

    function initWheel() {
      const svg = document.getElementById("wheel");
      const anglePerSegment = 360 / lots.length;
      lots.forEach((lot, i) => {
        const startAngle = i * anglePerSegment;
        const endAngle = startAngle + anglePerSegment;
        const x1 = 200 + 200 * Math.cos((startAngle - 90) * Math.PI / 180);
        const y1 = 200 + 200 * Math.sin((startAngle - 90) * Math.PI / 180);
        const x2 = 200 + 200 * Math.cos((endAngle - 90) * Math.PI / 180);
        const y2 = 200 + 200 * Math.sin((endAngle - 90) * Math.PI / 180);
        let color = (i % 3 === 0) ? "#FF8DA1" : (i % 3 === 1) ? "#B9D9EB" : "#FFD1A4";
        svg.innerHTML += `<path d="M 200 200 L ${x1} ${y1} A 200 200 0 0 1 ${x2} ${y2} Z" fill="${color}" stroke="#FFFFFF"/>`;
        svg.innerHTML += `<text x="315" y="200" fill="#1a1a2e" font-weight="900" font-size="14" transform="rotate(${startAngle - 60} 200 200)">${lot.text}</text>`;
      });
    }

    let isSpinning = false;

    window.checkAndSpin = async function() {
      if (isSpinning) return;
      const f = document.getElementById("firstName").value.trim();
      const l = document.getElementById("lastName").value.trim();
      if (!f || !l) return alert("Nom et prénom requis !");

      const fullName = (f + " " + l).toLowerCase();
      const q = query(collection(db, "players"), where("name", "==", fullName));
      const snap = await getDocs(q);

      if (!snap.empty) {
        document.getElementById("result").innerHTML = `🚫 Déjà joué ! Lot : <strong>${snap.docs[0].data().prize}</strong>`;
        return;
      }

      isSpinning = true;
      const deg = (10 * 360) + Math.floor(Math.random() * 360);
      document.getElementById("wheel").style.transition = "5s cubic-bezier(0.1, 0, 0.2, 1)";
      document.getElementById("wheel").style.transform = `rotate(${deg}deg)`;

      setTimeout(async () => {
        const winIdx = Math.floor(((360 - (deg % 360)) % 360) / 60);
        const prize = lots[winIdx].text;
        await addDoc(collection(db, "players"), { name: fullName, prize: prize, date: new Date() });
        document.getElementById("result").innerHTML = `Gagné : ${prize}`;
        document.getElementById("registration-form").style.display = "none";
        isSpinning = false;
      }, 5000);
    };

    window.sendMessage = async function() {
      const text = document.getElementById("msg").value.trim();
      const f = document.getElementById("firstName").value.trim();
      const l = document.getElementById("lastName").value.trim();
      if (!f || !text) return alert("Nom et message requis !");
      await addDoc(collection(db, "messages"), { text, author: f + " " + l, date: new Date() });
      document.getElementById("msg").value = "";
    };

    onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), snap => {
      const wall = document.getElementById("messages-wall");
      wall.innerHTML = "";
      const positions = [];
      const maxWidth = Math.min(window.innerWidth - 250, 1100);
      const maxHeight = 500;

      snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement("div");
        div.className = "posted-message";
        div.innerHTML = `<span class="msg-author">${d.author} :</span> ${d.text}`;

        let x, y, collision;
        let attempts = 0;
        do {
          collision = false;
          x = Math.random() * maxWidth;
          y = Math.random() * maxHeight;
          for (let p of positions) {
            if (Math.abs(x - p.x) < 240 && Math.abs(y - p.y) < 130) { collision = true; break; }
          }
          attempts++;
        } while (collision && attempts < 25);

        positions.push({ x, y });
        div.style.left = x + "px";
        div.style.top = y + "px";
        div.style.transform = `rotate(${Math.random() * 16 - 8}deg)`;
        wall.appendChild(div);
      });
    });

    function createGrid() {
      const container = document.getElementById('background-pattern');
      const images = ['1.png', '2.png', '3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png'];
      for (let i = 0; i < 30; i++) {
        const img = document.createElement('img');
        img.src = images[Math.floor(Math.random() * images.length)];
        img.className = 'bg-sticker';
        img.style.left = Math.random() * 95 + "vw";
        img.style.top = Math.random() * 300 + "vh";
        img.style.transform = `rotate(${Math.random() * 360}deg)`;
        img.onerror = () => img.remove();
        container.appendChild(img);
      }
    }

    window.onload = () => { initWheel(); createGrid(); };
  </script>
</body>
</html>
