<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solenne fête ses 30 ans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      color: white;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url('denim.jpg');
      background-size: 50% auto;
      background-repeat: repeat;
      background-attachment: fixed;
      background-color: #1a1a2e;
    }

    #background-pattern {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .bg-sticker {
      position: absolute;
      width: 150px;
      height: auto;
      opacity: 0.9;
      z-index: 1;
    }

    .container {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(45, 49, 66, 0.95) 100%);
      padding: 50px 40px;
      max-width: 900px;
      width: 95%;
      border: 6px solid #FF8DA1;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(212, 165, 116, 0.1);
      position: relative;
      z-index: 10;
    }

    h1 {
      font-family: 'Climate Crisis', sans-serif;
      font-size: 4em;
      color: white;
      text-align: center;
      text-transform: uppercase;
      line-height: 0.85;
      margin-bottom: 10px;
      text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.4);
      letter-spacing: 2px;
    }

    .subtitle { text-align: center; font-size: 1.1em; margin-bottom: 40px; color: #d4a574; font-weight: 600; letter-spacing: 1px; }

    /* Identification Form */
    #registration-form {
      text-align: center;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .input-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input[type="text"], textarea {
      padding: 12px 20px;
      border-radius: 8px;
      border: 2px solid #FF8DA1;
      background: #1a1a2e;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
    }

    input[type="text"] { width: 200px; }

    .wheel-section { text-align: center; margin-top: 40px; margin-bottom: 50px; }
    
    .wheel-container { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      margin: 80px 0; 
      position: relative; 
      z-index: 5; 
    }

    #star-background {
      position: absolute;
      width: 1000px; height: 1000px;
      background-image: url('star.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) translate(-50px, 70px);
      z-index: 4;
    }

    #wheel { width: 420px; height: 420px; border-radius: 50%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7); position: relative; z-index: 5; }

    #gun-pointer {
      position: absolute;
      width: 120px; height: 120px;
      background-image: url('gun.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      top: -70px; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: none;
    }

    .wheel-center { 
      position: absolute; 
      width: 150px; height: 150px; 
      background-image: url('sherif.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      top: 50%; left: 50%; 
      transform: translate(-50%, -50%); 
      z-index: 25; 
    }

    .spin-btn { 
      background-image: url('bouton.png');
      background-size: cover; 
      background-repeat: no-repeat;
      background-position: center;
      background-color: transparent;
      color: white; 
      font-weight: 900; 
      font-family: 'Outfit', sans-serif;
      font-size: 19px; 
      text-transform: uppercase;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      border: none; 
      cursor: pointer; 
      padding: 30px 70px; 
      position: relative;
      z-index: 10;
      filter: drop-shadow(0px 8px 10px rgba(0, 0, 0, 0.6));
      transition: all 0.15s ease-out; 
    }

    #result { 
      margin-top: 35px; font-size: 24px; font-weight: 700; 
      min-height: 70px; padding: 25px; border: 2px solid #d4a574; 
      color: #ffd89b; position: relative; z-index: 10;
      background: rgba(0,0,0,0.3); border-radius: 10px;
    }

/* --- SECTION MESSAGES --- */
    .messages-section { 
      padding: 30px; 
      margin-top: 40px; 
      position: relative; 
      z-index: 10;
      display: flex;
      align-items: flex-start; /* Aligne le haut de l'image avec le haut du formulaire */
      justify-content: center;
      gap: 20px;
      flex-wrap: nowrap; /* Garde l'image et la box côte à côte */
    }

    .wanted-poster {
      width: 150px; /* Taille de l'affiche */
      height: auto;
      flex-shrink: 0; /* Empêche l'image de rétrécir */
      filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.5));
      margin-top: 10px; /* Petit ajustement pour l'aligner parfaitement */
    }

    .message-container-right {
      flex-grow: 1;
      max-width: 500px; /* Évite que la box soit trop large */
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Pour le mobile : on repasse l'un sous l'autre */
    @media (max-width: 650px) {
      .messages-section {
        flex-wrap: wrap;
        flex-direction: column;
        align-items: center;
      }
      .wanted-poster {
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <div id="background-pattern"></div>
  
  <div class="container">
    <h1>Canadian Tuxedo is IN</h1>
    <p class="subtitle">Entrez votre nom pour tenter de gagner un lot !</p>

    <div class="wheel-section">
      <div id="registration-form">
        <div class="input-group">
          <input type="text" id="firstName" placeholder="Prénom">
          <input type="text" id="lastName" placeholder="Nom">
        </div>
        <button id="spinBtn" class="spin-btn" onclick="checkAndSpin()">Tourner la roue</button>
      </div>

      <div class="wheel-container">
        <div id="gun-pointer"></div>
        <div id="star-background"></div>
        <svg id="wheel" width="400" height="400" viewBox="0 0 400 400"></svg>
        <div class="wheel-center"></div>
      </div>
      
      <div id="result"></div>
    </div>
    
<div class="messages-section">
      <img src="wanted.png" alt="Wanted" class="wanted-poster">

      <div class="message-container-right">
        <h2 style="text-align: center; color: #FF8DA1; font-family: 'Climate Crisis'; font-size: 1.5em;">Wanted Messages</h2>
        
        <div class="message-input-box">
          <textarea id="msg" placeholder="Ton message ici..."></textarea>
          <button class="spin-btn" style="padding: 15px 30px; font-size: 14px; width: 100%;" onclick="sendMessage()">Envoyer</button>
        </div>

        <div id="messages"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbv7swd0ttL9ZgGjuWFy3PcJ1yrsJoy-Y",
      authDomain: "annivsolenne.firebaseapp.com",
      projectId: "annivsolenne",
      storageBucket: "annivsolenne.firebasestorage.app",
      messagingSenderId: "911639806164",
      appId: "1:911639806164:web:306c561b7619c795783b41",
      measurementId: "G-0FTQVZLD9F"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lots = [
      { text: "SHOT" },
      { text: "VERRE DE VIN" },
      { text: "MISSION MYSTERE" },
      { text: "UN BISOU" },
      { text: "UN CASH" },
      { text: "CLOPE" }
    ];

    function initWheel() {
      const svg = document.getElementById("wheel");
      const anglePerSegment = 360 / lots.length;
      svg.innerHTML = "";
      lots.forEach((lot, index) => {
        const startAngle = index * anglePerSegment;
        const endAngle = startAngle + anglePerSegment;
        const startRad = (startAngle - 90) * Math.PI / 180;
        const endRad = (endAngle - 90) * Math.PI / 180;
        const x1 = 200 + 200 * Math.cos(startRad);
        const y1 = 200 + 200 * Math.sin(startRad);
        const x2 = 200 + 200 * Math.cos(endRad);
        const y2 = 200 + 200 * Math.sin(endRad);
        let color = (index % 3 === 0) ? "#FF8DA1" : (index % 3 === 1) ? "#B9D9EB" : "#FFD1A4";
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M 200 200 L ${x1} ${y1} A 200 200 0 0 1 ${x2} ${y2} Z`);
        path.setAttribute("fill", color);
        path.setAttribute("stroke", "#FFFFFF");
        svg.appendChild(path);
        const midAngle = startAngle + anglePerSegment / 2;
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", 315); text.setAttribute("y", 200);
        text.setAttribute("fill", "#1a1a2e"); text.setAttribute("text-anchor", "middle");
        text.setAttribute("dominant-baseline", "middle"); text.setAttribute("font-size", "14px");
        text.setAttribute("font-weight", "900");
        text.setAttribute("transform", `rotate(${midAngle - 90} 200 200)`);
        text.textContent = lot.text;
        svg.appendChild(text);
      });
    }

    let isSpinning = false;

    window.checkAndSpin = async function() {
      if (isSpinning) return;
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      if (!firstName || !lastName) { alert("Nom et prénom requis !"); return; }

      const fullName = (firstName + " " + lastName).toLowerCase();
      const q = query(collection(db, "players"), where("name", "==", fullName));
      const snap = await getDocs(q);

      if (!snap.empty) {
        document.getElementById("result").innerHTML = `🚫 ${firstName}, tu as déjà joué ! Ton lot : <strong>${snap.docs[0].data().prize}</strong>`;
        return;
      }
      spinWheel(fullName, firstName);
    };

    function spinWheel(fullName, firstName) {
      isSpinning = true;
      const wheel = document.getElementById("wheel");
      const randomDegree = Math.floor(Math.random() * 360);
      const totalDegrees = (10 * 360) + randomDegree;
      wheel.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.2, 1)";
      wheel.style.transform = `rotate(${totalDegrees}deg)`;

      setTimeout(async () => {
        const normalized = (360 - (randomDegree % 360)) % 360;
        const winIdx = Math.floor(normalized / (360 / lots.length)) % lots.length;
        const prize = lots[winIdx].text;

        let msg = "";
        switch(prize) {
          case "CLOPE": msg = "Tu as perdu ! Tu dois une clope à Solenne."; break;
          case "SHOT": msg = "Tu as perdu ! Tu dois un shot à Solenne."; break;
          case "UN BISOU": msg = "Tu as gagné ! Un gros bisou de Solenne !"; break;
          case "MISSION MYSTERE": msg = "🕵️‍♂️ Va voir Solenne pour ton défi !"; break;
          case "VERRE DE VIN": msg = "Santé ! Tu dois un verre de vin à Solenne."; break;
          case "UN CASH": msg = "Chanceux ! Va voir une Mirouze pour ton cash."; break;
        }

        await addDoc(collection(db, "players"), { name: fullName, prize: prize, date: new Date() });
        document.getElementById("result").innerHTML = msg;
        document.getElementById("registration-form").style.display = "none";
        isSpinning = false;
      }, 5000);
    }

    window.sendMessage = async function() {
      const text = document.getElementById("msg").value.trim();
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      if (!firstName || !lastName) { alert("Remplis ton nom en haut !"); return; }
      if (!text) return;

      await addDoc(collection(db, "messages"), { 
        text: text, 
        author: firstName + " " + lastName, 
        date: new Date() 
      });
      document.getElementById("msg").value = "";
    };

    onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), snap => {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      snap.forEach(doc => {
        const data = doc.data();
        const div = document.createElement("div");
        div.innerHTML = `<span class="msg-author">${data.author} :</span> ${data.text}`;
        container.appendChild(div);
      });
    });

    function createGrid() {
      const container = document.getElementById('background-pattern');
      const images = ['1.png', '2.png', '3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png'];
      for (let i = 0; i < 40; i++) {
        const img = document.createElement('img');
        img.src = images[Math.floor(Math.random() * images.length)];
        img.className = 'bg-sticker';
        img.style.left = Math.random() * 100 + "vw";
        img.style.top = Math.random() * 200 + "vh";
        img.style.transform = `rotate(${Math.random() * 360}deg)`;
        img.onerror = function() { this.style.display = 'none'; };
        container.appendChild(img);
      }
    }

    window.onload = () => { initWheel(); createGrid(); };
  </script>
</body>
</html>
