<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solenne fête ses 30 ans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      color: white;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      background-image: url('denim.jpg');
      background-size: 50% auto;
      background-repeat: repeat;
      background-attachment: fixed;
      background-color: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #background-pattern {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .bg-sticker {
      position: absolute;
      width: 150px;
      height: auto;
      opacity: 0.9;
      z-index: 1;
    }

    /* --- BOITE PRINCIPALE (ROUE) --- */
    .container {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(45, 49, 66, 0.95) 100%);
      padding: 50px 40px;
      max-width: 900px;
      width: 95%;
      border: 6px solid #FF8DA1;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      position: relative;
      z-index: 10;
      margin-bottom: 50px;
    }

    h1 {
      font-family: 'Climate Crisis', sans-serif;
      font-size: 3.5em;
      text-align: center;
      text-transform: uppercase;
      line-height: 0.85;
      margin-bottom: 10px;
      text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.4);
    }

    .subtitle { text-align: center; font-size: 1.1em; margin-bottom: 40px; color: #d4a574; font-weight: 600; }

    #registration-form {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .input-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input[type="text"], textarea {
      padding: 12px 20px;
      border-radius: 8px;
      border: 2px solid #FF8DA1;
      background: #1a1a2e;
      color: white;
      font-family: 'Outfit', sans-serif;
    }

    input[type="text"] { width: 200px; }

    .wheel-container { 
      display: flex; justify-content: center; align-items: center; 
      margin: 80px 0; position: relative; 
    }

    #star-background {
      position: absolute;
      width: 1000px; height: 1000px;
      background-image: url('star.png');
      background-size: contain; background-repeat: no-repeat; background-position: center;
      top: 50%; left: 50%; transform: translate(-50%, -50%) translate(-50px, 70px);
      z-index: 4;
    }

    #wheel { width: 420px; height: 420px; position: relative; z-index: 5; }

    #gun-pointer {
      position: absolute; width: 120px; height: 120px;
      background-image: url('gun.png'); background-size: contain; background-repeat: no-repeat;
      top: -70px; left: 50%; transform: translateX(-50%); z-index: 100;
    }

    .wheel-center { 
      position: absolute; width: 150px; height: 150px; 
      background-image: url('sherif.png'); background-size: contain; background-repeat: no-repeat;
      top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 25; 
    }

    .spin-btn { 
      background-image: url('bouton.png'); background-size: cover; background-color: transparent;
      color: white; font-weight: 900; font-size: 19px; text-transform: uppercase;
      border: none; cursor: pointer; padding: 30px 70px; position: relative; z-index: 10;
      filter: drop-shadow(0px 8px 10px rgba(0, 0, 0, 0.6)); transition: transform 0.1s;
    }

    #result { 
      margin-top: 35px; font-size: 24px; font-weight: 700; text-align: center;
      padding: 25px; color: #ffd89b; background: rgba(0,0,0,0.3); border-radius: 10px;
    }

    /* --- SECTION MESSAGES (SUR LE DENIM) --- */
    .messages-section { 
      width: 95%; max-width: 900px; display: flex; align-items: flex-start;
      justify-content: center; gap: 30px; z-index: 10; padding-bottom: 50px;
    }

    .wanted-wrapper {
      background: rgba(0, 0, 0, 0.7); /* Fond contrasté */
      padding: 20px; border-radius: 15px; border: 2px solid #d4a574;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-shrink: 0;
    }

    .wanted-poster { width: 160px; height: auto; display: block; }

    .message-container-right { flex: 1; max-width: 550px; }

    .wall-title {
      font-family: 'Climate Crisis', sans-serif; font-size: 2em; color: #FF8DA1;
      text-align: center; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,1);
    }

    .message-input-box {
      background: rgba(26, 26, 46, 0.8); padding: 20px; border-radius: 15px;
      border: 2px solid #FF8DA1; margin-bottom: 25px;
    }

    #msg { width: 100%; height: 100px; background: rgba(0,0,0,0.4); margin-bottom: 10px; resize: none; }

    .send-btn-small { padding: 15px 30px !important; font-size: 14px !important; width: 100%; }

    #messages div { 
      background: rgba(0, 0, 0, 0.6); padding: 15px; margin-bottom: 12px; 
      border-radius: 8px; border-left: 5px solid #FF8DA1;
      box-shadow: 4px 4px 15px rgba(0,0,0,0.4);
    }

    .msg-author { color: #d4a574; font-weight: bold; text-transform: uppercase; font-size: 0.85em; display: block; margin-bottom: 5px; }

    @media (max-width: 700px) {
      .messages-section { flex-direction: column; align-items: center; }
      h1 { font-size: 2.5em; }
      #wheel { width: 320px; height: 320px; }
    }
  </style>
</head>
<body>
  <div id="background-pattern"></div>
  
  <div class="container">
    <h1>Canadian Tuxedo is IN</h1>
    <p class="subtitle">Solenne fête ses 30 ans !</p>

    <div class="wheel-section">
      <div id="registration-form">
        <div class="input-group">
          <input type="text" id="firstName" placeholder="Prénom">
          <input type="text" id="lastName" placeholder="Nom">
        </div>
        <button id="spinBtn" class="spin-btn" onclick="checkAndSpin()">Lancer la roue</button>
      </div>

      <div class="wheel-container">
        <div id="gun-pointer"></div>
        <div id="star-background"></div>
        <svg id="wheel" viewBox="0 0 400 400"></svg>
        <div class="wheel-center"></div>
      </div>
      <div id="result"></div>
    </div>
  </div>

  <div class="messages-section">
    <div class="wanted-wrapper">
      <img src="wanted.png" alt="Wanted" class="wanted-poster">
    </div>

    <div class="message-container-right">
      <h2 class="wall-title">Avis de recherche</h2>
      <div class="message-input-box">
        <textarea id="msg" placeholder="Laisse un message à Solenne..."></textarea>
        <button class="spin-btn send-btn-small" onclick="sendMessage()">Poster le message</button>
      </div>
      <div id="messages"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbv7swd0ttL9ZgGjuWFy3PcJ1yrsJoy-Y",
      authDomain: "annivsolenne.firebaseapp.com",
      projectId: "annivsolenne",
      storageBucket: "annivsolenne.firebasestorage.app",
      messagingSenderId: "911639806164",
      appId: "1:911639806164:web:306c561b7619c795783b41",
      measurementId: "G-0FTQVZLD9F"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lots = [
      { text: "SHOT" }, { text: "VERRE DE VIN" }, { text: "MISSION MYSTERE" },
      { text: "UN BISOU" }, { text: "UN CASH" }, { text: "CLOPE" }
    ];

    function initWheel() {
      const svg = document.getElementById("wheel");
      const anglePerSegment = 360 / lots.length;
      svg.innerHTML = "";
      lots.forEach((lot, index) => {
        const startAngle = index * anglePerSegment;
        const endAngle = startAngle + anglePerSegment;
        const startRad = (startAngle - 90) * Math.PI / 180;
        const endRad = (endAngle - 90) * Math.PI / 180;
        const x1 = 200 + 200 * Math.cos(startRad);
        const y1 = 200 + 200 * Math.sin(startRad);
        const x2 = 200 + 200 * Math.cos(endRad);
        const y2 = 200 + 200 * Math.sin(endRad);
        let color = (index % 3 === 0) ? "#FF8DA1" : (index % 3 === 1) ? "#B9D9EB" : "#FFD1A4";
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M 200 200 L ${x1} ${y1} A 200 200 0 0 1 ${x2} ${y2} Z`);
        path.setAttribute("fill", color);
        path.setAttribute("stroke", "#FFFFFF");
        svg.appendChild(path);
        const midAngle = startAngle + anglePerSegment / 2;
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", 315); text.setAttribute("y", 200);
        text.setAttribute("fill", "#1a1a2e"); text.setAttribute("text-anchor", "middle");
        text.setAttribute("dominant-baseline", "middle"); text.setAttribute("font-size", "14px");
        text.setAttribute("font-weight", "900");
        text.setAttribute("transform", `rotate(${midAngle - 90} 200 200)`);
        text.textContent = lot.text;
        svg.appendChild(text);
      });
    }

    let isSpinning = false;

    window.checkAndSpin = async function() {
      if (isSpinning) return;
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      if (!firstName || !lastName) { alert("Nom et prénom requis !"); return; }

      const fullName = (firstName + " " + lastName).toLowerCase();
      const q = query(collection(db, "players"), where("name", "==", fullName));
      const snap = await getDocs(q);

      if (!snap.empty) {
        document.getElementById("result").innerHTML = `🚫 ${firstName}, tu as déjà joué ! Ton lot : <strong>${snap.docs[0].data().prize}</strong>`;
        return;
      }
      spinWheel(fullName, firstName);
    };

    function spinWheel(fullName, firstName) {
      isSpinning = true;
      const wheel = document.getElementById("wheel");
      const randomDegree = Math.floor(Math.random() * 360);
      const totalDegrees = (10 * 360) + randomDegree;
      wheel.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.2, 1)";
      wheel.style.transform = `rotate(${totalDegrees}deg)`;

      setTimeout(async () => {
        const normalized = (360 - (randomDegree % 360)) % 360;
        const winIdx = Math.floor(normalized / (360 / lots.length)) % lots.length;
        const prize = lots[winIdx].text;
        let msg = "";
        switch(prize) {
          case "CLOPE": msg = "Tu as perdu ! Tu dois une clope à Solenne."; break;
          case "SHOT": msg = "Tu as perdu ! Tu dois un shot à Solenne."; break;
          case "UN BISOU": msg = "Tu as gagné ! Un gros bisou de Solenne !"; break;
          case "MISSION MYSTERE": msg = "🕵️‍♂️ Va voir Solenne pour ton défi !"; break;
          case "VERRE DE VIN": msg = "Santé ! Tu dois un verre de vin à Solenne."; break;
          case "UN CASH": msg = "Chanceux ! Va voir une Mirouze pour ton cash."; break;
        }
        await addDoc(collection(db, "players"), { name: fullName, prize: prize, date: new Date() });
        document.getElementById("result").innerHTML = msg;
        document.getElementById("registration-form").style.display = "none";
        isSpinning = false;
      }, 5000);
    }

    window.sendMessage = async function() {
      const text = document.getElementById("msg").value.trim();
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      if (!firstName || !lastName) { alert("Remplis tes noms en haut pour signer !"); return; }
      if (!text) return;
      await addDoc(collection(db, "messages"), { text, author: firstName + " " + lastName, date: new Date() });
      document.getElementById("msg").value = "";
    };

    onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), snap => {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement("div");
        div.innerHTML = `<span class="msg-author">${d.author} :</span> ${d.text}`;
        container.appendChild(div);
      });
    });

    function createGrid() {
      const container = document.getElementById('background-pattern');
      const images = ['1.png', '2.png', '3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png'];
      for (let i = 0; i < 35; i++) {
        const img = document.createElement('img');
        img.src = images[Math.floor(Math.random() * images.length)];
        img.className = 'bg-sticker';
        img.style.left = Math.random() * 100 + "vw";
        img.style.top = Math.random() * 200 + "vh";
        img.style.transform = `rotate(${Math.random() * 360}deg)`;
        img.onerror = function() { this.style.display = 'none'; };
        container.appendChild(img);
      }
    }

    window.onload = () => { initWheel(); createGrid(); };
  </script>
</body>
</html>
