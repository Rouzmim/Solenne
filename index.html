<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu QR</title>
</head>
<body style="text-align:center; font-family:Arial;">

<h1>🎡 Tourne la roue</h1>
<button onclick="spin()">Jouer</button>
<p id="result"></p>

<hr>

<h1>🧱 Le mur</h1>
<input id="msg" placeholder="Ton message">
<button onclick="sendMessage()">Envoyer</button>

<div id="messages"></div>

<script>
  // 🎡 ROUE (fonctionne 100% sans Firebase)
  const lots = ["🍺 Bière", "🎁 Cadeau", "❌ Perdu", "🍷 Vin"];

  function spin() {
    const result = lots[Math.floor(Math.random() * lots.length)];
    document.getElementById("result").innerText = result;
  }

  // 🧱 MUR LOCAL (temporaire)
  function sendMessage() {
    const text = document.getElementById("msg").value;
    if (!text) return;

    const div = document.createElement("div");
    div.innerText = text;
    document.getElementById("messages").prepend(div);

    document.getElementById("msg").value = "";
  }
</script>

</body>
</html>
