<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solenne fête ses 30 ans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      color: white;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url('denim.jpg');
      background-size: 50% auto;
      background-repeat: repeat;
      background-attachment: fixed;
      background-color: #1a1a2e;
    }

    #background-pattern {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .bg-sticker {
      position: absolute;
      width: 150px;
      height: auto;
      opacity: 0.9;
      z-index: 1;
    }

    .container {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(45, 49, 66, 0.95) 100%);
      padding: 50px 40px;
      max-width: 900px;
      width: 95%;
      border: 6px solid #FF8DA1;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(212, 165, 116, 0.1);
      position: relative;
      z-index: 10;
    }

    h1 {
      font-family: 'Climate Crisis', sans-serif;
      font-size: 4em;
      color: white;
      text-align: center;
      text-transform: uppercase;
      line-height: 0.85;
      margin-bottom: 10px;
      text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.4);
      letter-spacing: 2px;
    }

    .subtitle { text-align: center; font-size: 1.1em; margin-bottom: 40px; color: #d4a574; font-weight: 600; letter-spacing: 1px; }

    /* --- Formulaire d'inscription --- */
    #registration-form {
      text-align: center;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .input-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      padding: 12px 20px;
      border-radius: 8px;
      border: 2px solid #FF8DA1;
      background: #1a1a2e;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      width: 200px;
    }

    .wheel-section { text-align: center; margin-top: 40px; margin-bottom: 50px; }
    
    .wheel-container { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      margin: 80px 0; 
      position: relative; 
      z-index: 5; 
    }

    #star-background {
      position: absolute;
      width: 1000px; 
      height: 1000px;
      background-image: url('star.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translate(-50px, 70px);
      z-index: 4;
    }

    #wheel { 
      width: 420px; 
      height: 420px; 
      border-radius: 50%; 
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7); 
      border: none;
      background-color: transparent;
      position: relative;
      z-index: 5;
    }

    #gun-pointer {
      position: absolute;
      width: 120px; 
      height: 120px;
      background-image: url('gun.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      top: -70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: none;
    }

    .wheel-center { 
      position: absolute; 
      width: 150px; 
      height: 150px; 
      background-image: url('sherif.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      z-index: 25; 
    }

    .spin-btn { 
      background-image: url('bouton.png');
      background-size: cover; 
      background-repeat: no-repeat;
      background-position: center;
      background-color: transparent;
      color: white; 
      font-weight: 900; 
      font-family: 'Outfit', sans-serif;
      font-size: 19px; 
      text-transform: uppercase;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      border: none; 
      cursor: pointer; 
      padding: 30px 70px; 
      position: relative;
      z-index: 10;
      filter: drop-shadow(0px 8px 10px rgba(0, 0, 0, 0.6));
      transition: all 0.15s ease-out; 
    }

    .spin-btn:hover {
      transform: translateY(-2px) scale(1.03); 
      filter: drop-shadow(0px 12px 15px rgba(0, 0, 0, 0.7));
    }

    .spin-btn:active { 
      transform: translateY(1px) scale(0.97); 
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.5));
    }

    #result { 
      margin-top: 35px; font-size: 24px; font-weight: 700; 
      min-height: 70px; padding: 25px; border: 2px solid #d4a574; 
      color: #ffd89b; font-family: 'Outfit', sans-serif; 
      position: relative;
      z-index: 10;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
    }

/* --- SECTION MESSAGES REVISITÉE --- */
    .messages-section { 
      padding: 30px; 
      margin-top: 40px; 
      position: relative; 
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap; /* Pour le mobile */
      justify-content: center;
    }

    .wanted-poster {
      width: 180px; /* Ajuste la taille de ton image wanted.png ici */
      height: auto;
      filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.5));
    }

    .message-container-right {
      flex: 1;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message-input-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
      border: 1px dashed #d4a574;
    }

    #msg { 
      width: 100%;
      padding: 14px 18px; 
      border: 2px solid #d4a574; 
      background-color: rgba(0,0,0,0.4); 
      color: white; 
      margin-bottom: 10px;
      border-radius: 5px;
    }

    #messages { 
      max-height: 250px; 
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      margin-top: 15px;
    }

    #messages div { 
      background: rgba(212, 165, 116, 0.1); 
      padding: 10px; 
      margin-bottom: 8px; 
      border-bottom: 1px solid #d4a574;
      font-size: 0.9em;
    }

    .msg-author {
      color: #FF8DA1;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.8em;
      display: block;
    }

    @media (max-width: 600px) {
      #wheel { width: 320px; height: 320px; }
      #star-background { width: 400px; height: 400px; }
      h1 { font-size: 2.2em; }
      .input-group { flex-direction: column; align-items: center; }
      input[type="text"] { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="background-pattern"></div>
  
  <div class="container">
    <h1>Canadian Tuxedo is IN</h1>
    <p class="subtitle">Entrez votre nom pour tenter de gagner un lot !</p>

    <div class="wheel-section">
      <div id="registration-form">
        <div class="input-group">
          <input type="text" id="firstName" placeholder="Prénom">
          <input type="text" id="lastName" placeholder="Nom">
        </div>
        <button id="spinBtn" class="spin-btn" onclick="checkAndSpin()">Tourner la roue</button>
      </div>

      <div class="wheel-container">
        <div id="gun-pointer"></div>
        <div id="star-background"></div>
        <svg id="wheel" width="400" height="400" viewBox="0 0 400 400"></svg>
        <div class="wheel-center"></div>
      </div>
      
      <div id="result"></div>
    </div>
    
<div class="messages-section">
      <img src="wanted.png" alt="Wanted" class="wanted-poster">

      <div class="message-container-right">
        <h2>💌 Mur des mots doux 💌</h2>
        
        <div class="message-input-box">
          <textarea id="msg" placeholder="Laisse un message à Solenne... (Le nom utilisé pour la roue sera affiché)"></textarea>
          <button class="spin-btn" style="padding: 15px 30px; font-size: 14px;" onclick="sendMessage()">Envoyer mon message</button>
        </div>

        <div id="messages"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbv7swd0ttL9ZgGjuWFy3PcJ1yrsJoy-Y",
      authDomain: "annivsolenne.firebaseapp.com",
      projectId: "annivsolenne",
      storageBucket: "annivsolenne.firebasestorage.app",
      messagingSenderId: "911639806164",
      appId: "1:911639806164:web:306c561b7619c795783b41",
      measurementId: "G-0FTQVZLD9F"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lots = [
      { text: "SHOT", bg: "#634133" },
      { text: "VERRE DE VIN", bg: "#D1E5E9" },
      { text: "MISSION MYSTERE", bg: "#B5A642" },
      { text: "UN BISOU", bg: "#3E1F47" },
      { text: "UN CASH", bg: "#E9D2E1" },
      { text: "CLOPE", bg: "#C62E3E" },
    ];

    function initWheel() {
      const svg = document.getElementById("wheel");
      const anglePerSegment = 360 / lots.length;
      svg.innerHTML = "";

      lots.forEach((lot, index) => {
        const startAngle = index * anglePerSegment;
        const endAngle = startAngle + anglePerSegment;
        const startRad = (startAngle - 90) * Math.PI / 180;
        const endRad = (endAngle - 90) * Math.PI / 180;
        
        const x1 = 200 + 200 * Math.cos(startRad);
        const y1 = 200 + 200 * Math.sin(startRad);
        const x2 = 200 + 200 * Math.cos(endRad);
        const y2 = 200 + 200 * Math.sin(endRad);
        
        let segmentColor = (index % 3 === 0) ? "#FF8DA1" : (index % 3 === 1) ? "#B9D9EB" : "#FFD1A4";
        
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M 200 200 L ${x1} ${y1} A 200 200 0 0 1 ${x2} ${y2} Z`);
        path.setAttribute("fill", segmentColor);
        path.setAttribute("stroke", "#FFFFFF");
        path.setAttribute("stroke-width", "2");
        svg.appendChild(path);

        const midAngle = startAngle + anglePerSegment / 2;
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", 315);
        text.setAttribute("y", 200);
        text.setAttribute("fill", "#1a1a2e");
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("dominant-baseline", "middle");
        text.setAttribute("font-size", "14px");
        text.setAttribute("font-weight", "900");
        text.setAttribute("transform", `rotate(${midAngle - 90} 200 200)`);
        text.textContent = lot.text;
        svg.appendChild(text);
      });
    }

    let isSpinning = false;

    // --- NOUVELLE LOGIQUE DE VÉRIFICATION ---
    window.checkAndSpin = async function() {
      if (isSpinning) return;

      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();

      if (!firstName || !lastName) {
        alert("Cowboy ! Il me faut ton prénom et ton nom pour valider ton lot !");
        return;
      }

      const fullName = (firstName + " " + lastName).toLowerCase();

      try {
        // Vérifier si ce nom a déjà joué
        const q = query(collection(db, "players"), where("name", "==", fullName));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
          const userData = querySnapshot.docs[0].data();
          document.getElementById("result").innerHTML = `🚫 Désolé ${firstName}, tu as déjà joué ! Ton lot était : <br><strong>${userData.prize}</strong>`;
          return;
        }

        // Si nouveau joueur, on lance la roue
        spinWheel(fullName);
      } catch (e) {
        console.error("Erreur Firebase:", e);
        alert("Un problème est survenu avec la base de données.");
      }
    };

    function spinWheel(fullName) {
      isSpinning = true;
      const spinBtn = document.getElementById("spinBtn");
      spinBtn.disabled = true;
      spinBtn.style.opacity = "0.5";

      const wheel = document.getElementById("wheel");
      const randomDegree = Math.floor(Math.random() * 360);
      const totalDegrees = (10 * 360) + randomDegree;
      
      wheel.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.2, 1)";
      wheel.style.transform = `rotate(${totalDegrees}deg)`;

setTimeout(async () => {
        const normalized = (360 - (randomDegree % 360)) % 360;
        const winIdx = Math.floor(normalized / (360 / lots.length)) % lots.length;
        const wonPrize = lots[winIdx].text;

        // --- NOUVEAU : PERSONNALISATION DU MESSAGE ---
        let displayMessage = "";
        
        switch(wonPrize) {
          case "CLOPE":
            displayMessage = "Tu as perdu ! Tu dois une clope à Solenne.";
            break;
          case "SHOT":
            displayMessage = "Tu as perdu ! Tu dois un shot à Solenne.";
            break;
          case "UN BISOU":
            displayMessage = "Tu as gagné ! Un gros bisou de Solenne !";
            break;
          case "MISSION MYSTERE":
            displayMessage = "🕵️‍♂️ Mission acceptée ? Va voir Solenne pour ton défi !";
            break;
          case "VERRE DE VIN":
            displayMessage = "Santé ! Tu dois un verre de vin à Solenne.";
            break;
          case "UN CASH":
            displayMessage = "C'est ton jour de chance ! Va voir une Mirouze pour récupérer un cash.";
            break;
          default:
            displayMessage = `✨ Félicitations ! Tu as gagné : ${wonPrize} ✨`;
        }

        // Enregistrer le résultat dans Firebase (on garde le nom du lot court pour la BDD)
        await addDoc(collection(db, "players"), {
          name: fullName,
          prize: wonPrize,
          date: new Date()
        });

        // Afficher le message personnalisé
        document.getElementById("result").innerHTML = displayMessage;
        document.getElementById("registration-form").style.display = "none";
        isSpinning = false;
      }, 5000);
    }

    window.sendMessage = async function() {
      const text = document.getElementById("msg").value;
      if (!text.trim()) return;
      await addDoc(collection(db, "messages"), { text, date: new Date() });
      document.getElementById("msg").value = "";
    };

    onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), snap => {
      const container = document.getElementById("messages");
      if (!container) return;
      container.innerHTML = "";
      snap.forEach(doc => {
        const div = document.createElement("div");
        div.innerText = doc.data().text;
        container.appendChild(div);
      });
    });

    function createGrid() {
      const container = document.getElementById('background-pattern');
      const spacing = 200;
      const images = ['1.png', '2.png', '3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png'];
      for (let row = 0; row < 10; row++) {
        for (let col = 0; col < 10; col++) {
          if (Math.random() < 0.3) continue;
          const img = document.createElement('img');
          img.src = images[Math.floor(Math.random() * images.length)];
          img.className = 'bg-sticker';
          img.style.left = (col * spacing) + "px";
          img.style.top = (row * spacing) + "px";
          img.style.transform = `rotate(${Math.floor(Math.random() * 91) - 45}deg)`;
          img.onerror = function() { this.style.display = 'none'; };
          container.appendChild(img);
        }
      }
    }

    window.onload = function() {
      initWheel();
      createGrid();
    };
  </script>
</body>
</html>
