<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anniversaire Solenne 🎉</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      color: white;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url('denim.jpg');
      background-size: 50% auto;
      background-repeat: repeat;
      background-attachment: fixed;
      background-color: #1a1a2e;
    }

    #background-pattern {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .bg-sticker {
      position: absolute;
      width: 150px;
      height: auto;
      opacity: 0.9;
      z-index: 1;
    }

    .container {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(45, 49, 66, 0.95) 100%);
      padding: 50px 40px;
      max-width: 1000px;
      width: 95%;
      border: 6px solid #FF8DA1;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(212, 165, 116, 0.1);
      position: relative;
      z-index: 10;
    }
    h1 {
      font-family: 'Climate Crisis', sans-serif;
      font-size: 5em;
      color: white;
      text-align: center;
      text-transform: uppercase;
      line-height: 0.85;
      margin-bottom: 10px;
      text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.4);
      letter-spacing: 2px;
    }

    .subtitle { text-align: center; font-size: 1.1em; margin-bottom: 40px; color: #d4a574; font-weight: 600; letter-spacing: 1px; }

    /* --- MODIFIÉ : margin-top augmenté pour descendre la roue --- */
    .wheel-section { text-align: center; margin-top: 80px; margin-bottom: 50px; }
    
    .wheel-container { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      margin: 100px 0; 
      position: relative; 
      z-index: 5; 
    }

    /* --- NOUVEAU : Fond étoile derrière la roue --- */
    #star-background {
      position: absolute;
      width: 1000px; 
      height: 1000px;
      background-image: url('star.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translate(-50px, 70px);
      z-index: 4;
    } /* <-- Accolade rajoutée pour corriger l'erreur */

    #wheel { 
      width: 420px; 
      height: 420px; 
      border-radius: 50%; 
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7); 
      border: none;
      background-color: transparent;
      position: relative;
      z-index: 5;
    }

    #wheel text {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    /* --- NOUVEAU : Le curseur revolver gun.png --- */
    #gun-pointer {
  position: absolute;
  width: 100px; 
  height: 100px;
  background-image: url('gun.png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  top: -70px; /* Ajusté pour qu'il ne cache pas trop la roue */
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  pointer-events: none;
  
}

    .wheel-center { 
      position: absolute; 
      width: 40px; 
      height: 40px; 
      background: #333; 
      border-radius: 50%; 
      top: 50%; left: 50%; 
      transform: translate(-50%, -50%); 
      z-index: 25; 
    }

    button { 
      background: linear-gradient(135deg, #d4a574 0%, #8b7355 100%); 
      color: #1a1a2e; border: none; padding: 16px 45px; 
      font-size: 19px; cursor: pointer; font-weight: 700; 
      text-transform: uppercase;
      position: relative;
      z-index: 10;
    }

    #result { 
      margin-top: 35px; font-size: 28px; font-weight: 700; 
      min-height: 70px; padding: 25px; border: 2px solid #d4a574; 
      color: #ffd89b; font-family: 'Playfair Display', serif; 
      position: relative;
      z-index: 10;
    }

    .messages-section { background: rgba(212, 165, 116, 0.08); padding: 30px; margin-top: 40px; border: 2px solid #d4a574; position: relative; z-index: 10; }
    .message-input { display: flex; gap: 12px; margin-bottom: 25px; }
    #msg { flex: 1; padding: 14px 18px; border: 2px solid #d4a574; background-color: rgba(255,255,255,0.1); color: white; }
    #messages { max-height: 350px; overflow-y: auto; display: flex; flex-direction: column-reverse; }
    #messages div { background: rgba(212, 165, 116, 0.15); padding: 14px 16px; margin-bottom: 12px; border-left: 3px solid #d4a574; }

    @media (max-width: 600px) {
      #wheel { width: 320px; height: 320px; }
      #star-background { width: 400px; height: 400px; }
      h1 { font-size: 2em; }
    }
  </style>
</head>
<body>
  <div id="background-pattern"></div>
  
  <div class="container">
    <h1>Canadian Tuxedo is IN</h1>
    <div class="wheel-section">
      <div class="wheel-container">
        <div id="gun-pointer"></div>
        <div id="star-background"></div>
        <svg id="wheel" width="400" height="400" viewBox="0 0 400 400"></svg>
        <div class="wheel-center"></div>
      </div>
      <button id="spinBtn" onclick="spinWheel()">Tourner la roue</button>
      <div id="result"></div>
    </div>
    
    <div class="messages-section">
      <h2>💌 Mur des mots doux 💌</h2>
      <div class="message-input">
        <input type="text" id="msg" placeholder="Laisse un message à Solenne...">
        <button class="send-btn" onclick="sendMessage()">Envoyer</button>
      </div>
      <div id="messages"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbv7swd0ttL9ZgGjuWFy3PcJ1yrsJoy-Y",
      authDomain: "annivsolenne.firebaseapp.com",
      projectId: "annivsolenne",
      storageBucket: "annivsolenne.firebasestorage.app",
      messagingSenderId: "911639806164",
      appId: "1:911639806164:web:306c561b7619c795783b41",
      measurementId: "G-0FTQVZLD9F"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lots = [
      { text: "IT'S YOU'RE", bg: "#634133", color: "white" },
      { text: "TRY AGAIN", bg: "#D1E5E9", color: "#333" },
      { text: "FRIENDS", bg: "#B5A642", color: "#113BA6" },
      { text: "I'M BORED", bg: "#3E1F47", color: "#E9B383" },
      { text: "IT'S NOT YOU", bg: "#E9D2E1", color: "#458C45" },
      { text: "I'M COOL", bg: "#C62E3E", color: "#F1C40F" },
      { text: "GIVE UP", bg: "#A7D3A6", color: "#3E1F47" },
      { text: "LOVERS", bg: "#A8A8A8", color: "#E67E22" },
      { text: "UR GREAT", bg: "#113BA6", color: "white" },
      { text: "COY", bg: "#E9B383", color: "#333" }
    ];

    function initWheel() {
      const svg = document.getElementById("wheel");
      const anglePerSegment = 360 / lots.length;
      
      lots.forEach((lot, index) => {
        const startAngle = index * anglePerSegment;
        const endAngle = startAngle + anglePerSegment;
        const startRad = (startAngle - 90) * Math.PI / 180;
        const endRad = (endAngle - 90) * Math.PI / 180;
        const x1 = 200 + 200 * Math.cos(startRad);
        const y1 = 200 + 200 * Math.sin(startRad);
        const x2 = 200 + 200 * Math.cos(endRad);
        const y2 = 200 + 200 * Math.sin(endRad);
        
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M 200 200 L ${x1} ${y1} A 200 200 0 0 1 ${x2} ${y2} Z`);
        path.setAttribute("fill", lot.bg);
        svg.appendChild(path);

        const midAngle = startAngle + anglePerSegment / 2;
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", 200);
        text.setAttribute("y", 65);
        text.setAttribute("fill", lot.color);
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("font-size", "16px");
        text.setAttribute("transform", `rotate(${midAngle} 200 200)`);
        text.textContent = lot.text;
        svg.appendChild(text);
      });
    }

    let isSpinning = false;
    window.spinWheel = function() {
      if (isSpinning) return;
      isSpinning = true;
      const wheel = document.getElementById("wheel");
      const randomDegree = Math.floor(Math.random() * 360);
      const totalDegrees = (10 * 360) + randomDegree;
      wheel.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.2, 1)";
      wheel.style.transform = `rotate(${totalDegrees}deg)`;
      setTimeout(() => {
        const normalized = (360 - (randomDegree % 360)) % 360;
        const winIdx = Math.floor(normalized / (360 / lots.length)) % lots.length;
        document.getElementById("result").innerText = "✨ " + lots[winIdx].text + " ✨";
        isSpinning = false;
      }, 5000);
    };

    window.sendMessage = async function() {
      const text = document.getElementById("msg").value;
      if (!text.trim()) return;
      await addDoc(collection(db, "messages"), { text, date: new Date() });
      document.getElementById("msg").value = "";
    };

    onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), snap => {
      const container = document.getElementById("messages");
      if (!container) return;
      container.innerHTML = "";
      snap.forEach(doc => {
        const div = document.createElement("div");
        div.innerText = doc.data().text;
        container.appendChild(div);
      });
    });

    function createGrid() {
      const container = document.getElementById('background-pattern');
      const spacing = 200;
      const images = ['1.png', '2.png', '3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png'];
      for (let row = 0; row < 10; row++) {
        for (let col = 0; col < 10; col++) {
          if (Math.random() < 0.3) continue;
          const img = document.createElement('img');
          img.src = images[Math.floor(Math.random() * images.length)];
          img.className = 'bg-sticker';
          img.style.left = (col * spacing) + "px";
          img.style.top = (row * spacing) + "px";
          img.style.transform = `rotate(${Math.floor(Math.random() * 91) - 45}deg)`;
          img.onerror = function() { this.style.display = 'none'; };
          container.appendChild(img);
        }
      }
    }

    window.onload = function() {
      initWheel();
      createGrid();
    };
  </script>
</body>
</html>
