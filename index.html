<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anniversaire Solenne 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d3142 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

#background-pattern {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.bg-sticker {
  position: absolute; /* Indispensable pour le placement via JS */
  width: 130px;        /* Taille des photos */
  height: auto;
  opacity: 0.9;      /* Transparence */
  z-index: 1;
}

    .container {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(45, 49, 66, 0.95) 100%);
      padding: 50px 40px;
      max-width: 800px;
      width: 100%;
      border: 3px solid #d4a574;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(212, 165, 116, 0.1);
      position: relative;
      z-index: 10;
    }

    /* Le reste de ton CSS est parfait, je le condense pour la clarté */
   h1 {
  text-align: center;
  margin-bottom: 15px;
  font-size: 3.2em;
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.8), 0 0 20px rgba(212, 165, 116, 0.4);
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #ffd89b;
  /* L'animation "pulse" a été supprimée ici */
}
    .subtitle { text-align: center; font-size: 1.1em; margin-bottom: 40px; color: #d4a574; font-weight: 600; letter-spacing: 1px; }
    h2 { margin-bottom: 25px; font-size: 1.8em; font-family: 'Playfair Display', serif; color: #ffd89b; text-transform: uppercase; }
    .wheel-section { text-align: center; margin-bottom: 50px; }
    .wheel-container { display: flex; justify-content: center; align-items: center; margin: 40px 0; position: relative; z-index: 5; }
    #wheel { width: 420px; height: 420px; border-radius: 50%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7); border: 12px solid #2d3142; }
    .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid #d4a574; z-index: 20; }
    .wheel-center { position: absolute; width: 50px; height: 50px; background: radial-gradient(circle at 35% 35%, #d4a574, #8b7355); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 25; border: 4px solid #2d3142; }
    button { background: linear-gradient(135deg, #d4a574 0%, #8b7355 100%); color: #1a1a2e; border: none; padding: 16px 45px; font-size: 19px; cursor: pointer; font-weight: 700; text-transform: uppercase; font-family: 'Outfit', sans-serif; }
    #result { margin-top: 35px; font-size: 28px; font-weight: 700; min-height: 70px; padding: 25px; border: 2px solid #d4a574; color: #ffd89b; font-family: 'Playfair Display', serif; }
    .messages-section { background: rgba(212, 165, 116, 0.08); padding: 30px; margin-top: 40px; border: 2px solid #d4a574; }
    .message-input { display: flex; gap: 12px; margin-bottom: 25px; }
    #msg { flex: 1; padding: 14px 18px; border: 2px solid #d4a574; }
    #messages { max-height: 350px; overflow-y: auto; display: flex; flex-direction: column-reverse; }
    #messages div { background: rgba(212, 165, 116, 0.15); padding: 14px 16px; margin-bottom: 12px; border-left: 3px solid #d4a574; }
    .denim-texture { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; opacity: 0.3; background-image: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(212, 165, 116, 0.03) 2px, rgba(212, 165, 116, 0.03) 4px); }

    @media (max-width: 600px) {
      #wheel { width: 300px; height: 300px; }
      h1 { font-size: 2.2em; }
    }
  </style>
</head>
<body>
  <div id="background-pattern"></div>
  <div class="denim-texture"></div>
  
  <div class="container">
    <h1> Canadian Tuxedo in IN</h1>
    <div class="subtitle"> Solenne a 30 ans</div>
    
    <div class="wheel-section">
      <h2>🎡 Tourne la Roue du Destin de Sheriff 🎡</h2>
      <div class="wheel-container">
        <div class="pointer"></div>
        <svg id="wheel" width="420" height="420" viewBox="0 0 400 400"></svg>
        <div class="wheel-center"></div>
      </div>
      <button id="spinBtn" onclick="spinWheel()"> Découvre ton cadeau </button>
      <div id="result"></div>
    </div>
    
    <div class="messages-section">
      <h2>💌 Mur des mots doux 💌</h2>
      <div class="message-input">
        <input type="text" id="msg" placeholder="Laisse un message à Solenne pour qu'elle n'oublie jamais cet anniversaire">
        <button class="send-btn" onclick="sendMessage()">Envoyer</button>
      </div>
      <div id="messages"></div>
    </div>
  </div>

  <script type="module">
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbv7swd0ttL9ZgGjuWFy3PcJ1yrsJoy-Y",
      authDomain: "annivsolenne.firebaseapp.com",
      projectId: "annivsolenne",
      storageBucket: "annivsolenne.firebasestorage.app",
      messagingSenderId: "911639806164",
      appId: "1:911639806164:web:306c561b7619c795783b41",
      measurementId: "G-0FTQVZLD9F"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lots = ["Paye un shot à Solenne", " Solenne t'offres un goal ", "Cul sec", "Paye un verre de vin à solenne ", " Solenne te fait un bisou ", " 6-7"];
    const denimShades = ["#1a3a52", "#2d4e6b", "#1e2e4a", "#3d5a7a", "#2a4569", "#1f3a5c"];

function createFixedGrid() {
  const container = document.getElementById('background-pattern');
  // J'augmente légèrement le spacing pour gérer les rotations à 45° sans superposition
  const spacing = 380; 
  let images = ['1.png', '2.png', '3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png'];
  
  // On mélange l'ordre des 9 images une seule fois pour la grille
  images.sort(() => Math.random() - 0.5); 

  // On génère 10 lignes et 10 colonnes pour bien couvrir l'écran
  for (let row = 0; row < 10; row++) {
    for (let col = 0; col < 10; col++) {
      const img = document.createElement('img');
      // Logique 3x3 pour éviter les répétitions directes
      const imgIndex = (row % 3) * 3 + (col % 3);
      img.src = images[imgIndex];
      img.className = 'bg-sticker';

      // Positionnement strict en grille
      img.style.left = (col * spacing) + "px";
      img.style.top = (row * spacing) + "px";

      // --- ICI LA ROTATION ALEATOIRE DE -45 à +45° ---
      // Math.random() donne entre 0 et 1.
      // * 91 donne entre 0 et 90.99.
      // Math.floor() donne un entier entre 0 et 90.
      // - 45 donne un entier entre -45 et +45.
      const randomRotation = Math.floor(Math.random() * 91) - 45; 
      img.style.transform = `rotate(${randomRotation}deg)`;
      // ------------------------------------------------

      container.appendChild(img);
    }
  }
}

createFixedGrid();

    function initWheel() {
      const svg = document.getElementById("wheel");
      const anglePerSegment = 360 / lots.length;
      lots.forEach((lot, index) => {
        const startAngle = index * anglePerSegment;
        const endAngle = startAngle + anglePerSegment;
        const startRad = (startAngle - 90) * Math.PI / 180;
        const endRad = (endAngle - 90) * Math.PI / 180;
        const x1 = 200 + 200 * Math.cos(startRad);
        const y1 = 200 + 200 * Math.sin(startRad);
        const x2 = 200 + 200 * Math.cos(endRad);
        const y2 = 200 + 200 * Math.sin(endRad);
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M 200 200 L ${x1} ${y1} A 200 200 0 0 1 ${x2} ${y2} Z`);
        path.setAttribute("fill", denimShades[index % denimShades.length]);
        path.setAttribute("stroke", "#d4a574");
        svg.appendChild(path);

        const midAngle = startAngle + anglePerSegment / 2;
        const midRad = (midAngle - 90) * Math.PI / 180;
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        const tx = 200 + 130 * Math.cos(midRad);
        const ty = 200 + 130 * Math.sin(midRad);
        text.setAttribute("x", tx);
        text.setAttribute("y", ty);
        text.setAttribute("fill", "#ffd89b");
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("transform", `rotate(${midAngle + 90} ${tx} ${ty})`);
        text.textContent = lot;
        svg.appendChild(text);
      });
    }

    let isSpinning = false;
    window.spinWheel = function() {
      if (isSpinning) return;
      isSpinning = true;
      const wheel = document.getElementById("wheel");
      const randomDegree = Math.floor(Math.random() * 360);
      const totalDegrees = (10 * 360) + randomDegree;
      wheel.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.2, 1)";
      wheel.style.transform = `rotate(${totalDegrees}deg)`;
      setTimeout(() => {
        const normalized = (360 - (randomDegree % 360)) % 360;
        const winIdx = Math.floor(normalized / (360/lots.length)) % lots.length;
        document.getElementById("result").innerText = "🎊 " + lots[winIdx] + " 🎊";
        isSpinning = false;
      }, 5000);
    };

    window.sendMessage = async function() {
      const text = document.getElementById("msg").value;
      if (!text.trim()) return;
      await addDoc(collection(db, "messages"), { text, date: new Date() });
      document.getElementById("msg").value = "";
    };

    function loadMessages() {
      onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), snap => {
        const container = document.getElementById("messages");
        container.innerHTML = "";
        snap.forEach(doc => {
          const div = document.createElement("div");
          div.innerText = doc.data().text;
          container.appendChild(div);
        });
      });
    }

    initWheel();
    loadMessages();
  </script>
</body>
</html>
