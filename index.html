<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solenne fête ses 30 ans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      color: white;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      background-image: url('denim.jpg');
      background-size: 600px auto; /* Taille du motif jean */
      background-repeat: repeat;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #background-pattern {
      position: absolute; /* Change de fixed à absolute pour suivre le scroll */
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .bg-sticker { position: absolute; width: 150px; opacity: 0.9; z-index: 1; }

    /* --- BOITE ROUE --- */
    .container {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(45, 49, 66, 0.95) 100%);
      padding: 50px 40px;
      max-width: 900px;
      width: 95%;
      border: 6px solid #FF8DA1;
      border-radius: 30px; /* Coins bien arrondis */
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      position: relative;
      z-index: 10;
      margin-bottom: 60px;
      text-align: center;
    }

    h1 {
      font-family: 'Climate Crisis', sans-serif;
      font-size: 3.5em;
      text-transform: uppercase;
      line-height: 0.85;
      margin-bottom: 15px;
      text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.4);
    }

    .subtitle { font-size: 1.1em; margin-bottom: 40px; color: #d4a574; font-weight: 600; }

    /* --- BOUTON ORIGINAL --- */
.spin-btn { 
      background-image: url('bouton.png');
      background-size: 100% 100%; /* S'adapte à la taille sans déformer */
      background-repeat: no-repeat;
      background-position: center;
      background-color: transparent;
      color: white; 
      font-weight: 900; 
      font-size: 19px; 
      text-transform: uppercase;
      border: none; 
      cursor: pointer; 
      padding: 30px 70px; 
      position: relative;
      z-index: 50; /* Doit être au-dessus de tout */
      filter: drop-shadow(0px 8px 10px rgba(0, 0, 0, 0.6));
      display: inline-block;
    }

    .spin-btn:active { transform: scale(0.95); }

    /* --- ROUE --- */
    .wheel-container { 
      display: flex; justify-content: center; align-items: center; 
      margin: 60px 0; position: relative; 
    }

    #star-background {
      position: absolute;
      width: 800px; height: 800px;
      background-image: url('star.png');
      background-size: contain; background-repeat: no-repeat; background-position: center;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 4;
      pointer-events: none;
    }

    #wheel { width: 420px; height: 420px; position: relative; z-index: 5; }

    #gun-pointer {
      position: absolute; width: 120px; height: 120px;
      background-image: url('gun.png'); background-size: contain; background-repeat: no-repeat;
      top: -60px; left: 50%; transform: translateX(-50%); z-index: 100;
    }

    .wheel-center { 
      position: absolute; width: 140px; height: 140px; 
      background-image: url('sherif.png'); background-size: contain; background-repeat: no-repeat;
      top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 25; 
    }

    /* --- RESULTAT (DESCENDU ET SURÉLEVÉ) --- */
    #result { 
      margin-top: 80px; /* Plus d'espace sous la roue */
      font-size: 24px; font-weight: 900; 
      padding: 30px; color: #ffd89b; 
      background: rgba(0,0,0,0.5); 
      border-radius: 20px;
      position: relative;
      z-index: 30; /* Passe au dessus de la star */
      border: 2px solid #FF8DA1;
      min-height: 80px;
    }

    /* --- SECTION SAISIE --- */
    .input-section {
      width: 95%; max-width: 900px; display: flex; align-items: center;
      justify-content: center; gap: 40px; z-index: 10; margin-bottom: 50px;
    }

    .wanted-wrapper {
      background: rgba(0, 0, 0, 0.8); padding: 25px; border-radius: 20px; 
      border: 4px solid #FF8DA1;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6); flex-shrink: 0;
    }

    .wanted-poster { width: 250px; height: auto; display: block; }

    .message-container-right { flex: 1; max-width: 500px; }

    .wall-title {
      font-family: 'Climate Crisis', sans-serif; font-size: 2.5em; 
      color: #FFFFFF; text-align: center; margin-bottom: 25px; 
      text-shadow: 3px 3px 0px #FF8DA1; text-transform: uppercase;
    }

    .message-input-box {
      background: rgba(26, 26, 46, 0.9); padding: 25px; border-radius: 25px;
      border: 2px solid #FF8DA1;
    }

    #msg { width: 100%; height: 110px; background: rgba(0,0,0,0.4); border-radius: 10px; margin-bottom: 15px; resize: none; color: white; padding: 10px; border: 1px solid #FF8DA1; }

    /* --- LE MUR --- */
    #messages-wall {
      width: 100%; min-height: 700px; position: relative; z-index: 10; margin-bottom: 100px;
    }

    .posted-message {
      position: absolute; width: 240px;
      background: rgba(0, 0, 0, 0.85); padding: 20px; border-radius: 10px;
      border-left: 6px solid #FF8DA1; box-shadow: 10px 10px 25px rgba(0,0,0,0.6);
      font-size: 1em; z-index: 10;
    }

    .msg-author { color: #d4a574; font-weight: 900; text-transform: uppercase; font-size: 0.85em; display: block; margin-bottom: 8px; }

    @media (max-width: 800px) {
      .input-section { flex-direction: column; }
      .wanted-poster { width: 200px; }
      #messages-wall { display: flex; flex-direction: column; align-items: center; height: auto; }
      .posted-message { position: relative !important; left: 0 !important; top: 0 !important; margin: 15px 0; width: 90%; transform: none !important; }
    }
  </style>
</head>
<body>
  <div id="background-pattern"></div>
  
  <div class="container">
    <h1>Canadian Tuxedo is IN</h1>
    <p class="subtitle">Solenne fête ses 30 ans !</p>

    <div id="registration-form">
      <div class="input-group">
        <input type="text" id="firstName" placeholder="Prénom">
        <input type="text" id="lastName" placeholder="Nom">
      </div>
      <button id="spinBtn" class="spin-btn" onclick="checkAndSpin()">Lancer la roue</button>
    </div>

    <div class="wheel-container">
      <div id="gun-pointer"></div>
      <div id="star-background"></div>
      <svg id="wheel" viewBox="0 0 400 400"></svg>
      <div class="wheel-center"></div>
    </div>
    
    <div id="result">Fais tourner la roue pour voir ton lot !</div>
  </div>

  <div class="input-section">
    <div class="wanted-wrapper">
      <img src="wanted.png" alt="Wanted" class="wanted-poster">
    </div>
    <div class="message-container-right">
      <h2 class="wall-title">Avis de recherche</h2>
      <div class="message-input-box">
        <textarea id="msg" placeholder="Écris ton message ici..."></textarea>
        <button class="spin-btn" style="padding: 20px; font-size: 14px; width: 100%; border-radius: 15px;" onclick="sendMessage()">Poster le message</button>
      </div>
    </div>
  </div>

  <div id="messages-wall"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbv7swd0ttL9ZgGjuWFy3PcJ1yrsJoy-Y",
      authDomain: "annivsolenne.firebaseapp.com",
      projectId: "annivsolenne",
      storageBucket: "annivsolenne.firebasestorage.app",
      messagingSenderId: "911639806164",
      appId: "1:911639806164:web:306c561b7619c795783b41"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lots = [
      { text: "UN SHOT" }, { text: "UN VERRE DE VIN" }, { text: "MISSION SECRETE" },
      { text: "UN BISOU" }, { text: "UN CASH" }, { text: "UNE CLOPE" }
    ];

    function initWheel() {
      const svg = document.getElementById("wheel");
      const step = 360 / lots.length;
      svg.innerHTML = "";
      lots.forEach((lot, i) => {
        const start = i * step;
        const end = start + step;
        const x1 = 200 + 200 * Math.cos((start - 90) * Math.PI / 180);
        const y1 = 200 + 200 * Math.sin((start - 90) * Math.PI / 180);
        const x2 = 200 + 200 * Math.cos((end - 90) * Math.PI / 180);
        const y2 = 200 + 200 * Math.sin((end - 90) * Math.PI / 180);
        let color = (i % 3 === 0) ? "#FF8DA1" : (i % 3 === 1) ? "#B9D9EB" : "#FFD1A4";
        
        svg.innerHTML += `<path d="M 200 200 L ${x1} ${y1} A 200 200 0 0 1 ${x2} ${y2} Z" fill="${color}" stroke="#FFFFFF" stroke-width="2"/>`;
        
        const textAngle = start + step / 2;
        svg.innerHTML += `
          <text x="310" y="200" 
            fill="#1a1a2e" 
            font-weight="900" 
            font-size="16" 
            text-anchor="middle" 
            dominant-baseline="central"
            transform="rotate(${textAngle - 90} 200 200)">
            ${lot.text}
          </text>`;
      });
    }

    let isSpinning = false;
    window.checkAndSpin = async function() {
      if (isSpinning) return;
      const f = document.getElementById("firstName").value.trim();
      const l = document.getElementById("lastName").value.trim();
      if (!f || !l) return alert("Remplis ton nom Cowboy !");

      const fullName = (f + " " + l).toLowerCase();
      const snap = await getDocs(query(collection(db, "players"), where("name", "==", fullName)));

      if (!snap.empty) {
        document.getElementById("result").innerHTML = `🚫 Déjà joué ! Lot : ${snap.docs[0].data().prize}`;
        return;
      }

      isSpinning = true;
      const deg = (12 * 360) + Math.floor(Math.random() * 360);
      document.getElementById("wheel").style.transition = "6s cubic-bezier(0.15, 0, 0.15, 1)";
      document.getElementById("wheel").style.transform = `rotate(${deg}deg)`;

      setTimeout(async () => {
        const actualDeg = (360 - (deg % 360)) % 360;
        const winIdx = Math.floor(actualDeg / (360 / lots.length));
        const prize = lots[winIdx].text;
        await addDoc(collection(db, "players"), { name: fullName, prize, date: new Date() });
        document.getElementById("result").innerHTML = `🎯 BRAVO ! TU AS GAGNÉ : ${prize}`;
        isSpinning = false;
      }, 6000);
    };

    window.sendMessage = async function() {
      const text = document.getElementById("msg").value.trim();
      const f = document.getElementById("firstName").value.trim();
      const l = document.getElementById("lastName").value.trim();
      if (!f || !text) return alert("Nom et message requis !");
      await addDoc(collection(db, "messages"), { text, author: f + " " + l, date: new Date() });
      document.getElementById("msg").value = "";
    };

    onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), snap => {
      const wall = document.getElementById("messages-wall");
      wall.innerHTML = "";
      const positions = [];
      const width = window.innerWidth - 300;
      const height = 600;

      snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement("div");
        div.className = "posted-message";
        div.innerHTML = `<span class="msg-author">${d.author} :</span> ${d.text}`;

        let x, y, collision;
        let attempts = 0;
        do {
          collision = false;
          x = Math.random() * width;
          y = Math.random() * height;
          for (let p of positions) {
            if (Math.abs(x - p.x) < 250 && Math.abs(y - p.y) < 140) { collision = true; break; }
          }
          attempts++;
        } while (collision && attempts < 30);

        positions.push({ x, y });
        div.style.left = Math.max(20, x) + "px";
        div.style.top = y + "px";
        div.style.transform = `rotate(${Math.random() * 14 - 7}deg)`;
        wall.appendChild(div);
      });
    });

    function createGrid() {
      const container = document.getElementById('background-pattern');
      const images = ['1.png', '2.png', '3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png'];
      for (let i = 0; i < 40; i++) {
        const img = document.createElement('img');
        img.src = images[Math.floor(Math.random() * images.length)];
        img.className = 'bg-sticker';
        img.style.left = Math.random() * 95 + "vw";
        img.style.top = Math.random() * 400 + "vh"; // Couvre une grande hauteur
        img.style.transform = `rotate(${Math.random() * 360}deg)`;
        img.onerror = () => img.remove();
        container.appendChild(img);
      }
    }

    window.onload = () => { initWheel(); createGrid(); };
  </script>
</body>
</html>
    }
