<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu QR</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    section {
      padding: 50px 20px;
      border-bottom: 1px solid #ccc;
    }
    button {
      padding: 15px 25px;
      font-size: 18px;
      margin-top: 20px;
    }
    input {
      padding: 10px;
      width: 80%;
      max-width: 300px;
    }
    .message {
      margin: 10px;
      padding: 10px;
      background: #f0f0f0;
    }
  </style>
</head>
<body>

<section>
  <h1>🎡 Tourne la roue</h1>
  <button onclick="spin()">Jouer</button>
  <p id="result"></p>
</section>

<section>
  <h1>🧱 Le mur</h1>
  <input id="msg" placeholder="Ton message">
  <br>
  <button onclick="sendMessage()">Envoyer</button>

  <div id="messages"></div>
</section>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
  // 👉 REMPLACE PAR TES INFOS FIREBASE
  const firebaseConfig = {
    apiKey: "XXX",
    authDomain: "XXX",
    projectId: "XXX"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 🎡 ROUE
  const lots = ["🍺 Bière", "🎁 Cadeau", "❌ Perdu", "🍷 Vin"];

  function spin() {
    const result = lots[Math.floor(Math.random() * lots.length)];
    document.getElementById("result").innerText = result;

    db.collection("spins").add({
      result: result,
      date: new Date()
    });
  }

  // 🧱 MUR
  function sendMessage() {
    const text = document.getElementById("msg").value;
    if (!text) return;

    db.collection("messages").add({
      text: text,
      date: new Date()
    });

    document.getElementById("msg").value = "";
  }

  function loadMessages() {
    db.collection("messages")
      .orderBy("date", "desc")
      .onSnapshot(snapshot => {
        const container = document.getElementById("messages");
        container.innerHTML = "";

        snapshot.forEach(doc => {
          const div = document.createElement("div");
          div.className = "message";
          div.innerText = doc.data().text;
          container.appendChild(div);
        });
      });
  }

  loadMessages();
</script>

</body>
</html>
